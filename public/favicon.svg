<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0D0D0D"/>

  <!-- Figma side: 3 stacked blocks (Figma brand colors) -->
  <rect x="3" y="3"  width="11" height="7" rx="2" fill="#9747FF"/>
  <rect x="3" y="12" width="11" height="7" rx="2" fill="#F24E1E"/>
  <rect x="3" y="21" width="11" height="8" rx="2" fill="#0ACF83"/>

  <!-- Bidirectional arrows (center) -->
  <path d="M15.5 13.5 L17.5 16 L15.5 18.5" fill="none" stroke="#9747FF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16.5 13.5 L14.5 16 L16.5 18.5" fill="none" stroke="#FF6B35" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Claude Code side: terminal window -->
  <rect x="18" y="3" width="11" height="26" rx="2" fill="#1C1C1C" stroke="#2E2E2E" stroke-width="0.5"/>
  <!-- Traffic light dots -->
  <circle cx="21" cy="7" r="1.2" fill="#F24E1E"/>
  <circle cx="24" cy="7" r="1.2" fill="#F5A623"/>
  <circle cx="27" cy="7" r="1.2" fill="#0ACF83"/>
  <!-- Prompt -->
  <text x="19.5" y="19" font-family="'Courier New', monospace" font-size="8" font-weight="bold" fill="#FF6B35">&gt;_</text>
</svg>
