<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44">
  <defs>
    <!-- 45deg stripes — rgba(255,140,0,0.12) — maps to repeating-linear-gradient(45deg) -->
    <pattern id="d1" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(45 22 22)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="rgba(255,140,0,0.12)" stroke-width="1"/>
    </pattern>
    <!-- -45deg stripes — rgba(255,69,0,0.08) — maps to repeating-linear-gradient(-45deg) -->
    <pattern id="d2" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(-45 22 22)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="rgba(255,69,0,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="44" height="44" fill="url(#d1)"/>
  <rect width="44" height="44" fill="url(#d2)"/>
</svg>
